<div class="modal-content">
    <span class="close" onclick="cerrarModal('producto')">&times;</span>
    <h3 id="modal-producto-titulo">Nuevo Producto</h3>
    <form id="form-producto" onsubmit="guardarProducto(event)">
        <input type="text" placeholder="Nombre del producto" id="modal-producto-nombre" required>
        <input type="text" placeholder="Descripción" id="modal-producto-descripcion">
        <input type="number" placeholder="Precio" id="modal-producto-precio" step="0.01" required>
        <select id="modal-producto-categoria" required>
            <option value="">Seleccione categoría</option>
            <option value="Computadoras">Computadoras</option>
            <option value="Accesorios">Accesorios</option>
            <option value="Monitores">Monitores</option>
            <option value="Periféricos">Periféricos</option>
            <option value="Otros">Otros</option>
        </select>
        <input type="number" placeholder="Stock" id="modal-producto-stock" min="0">
        <button type="submit" class="btn-primary">Guardar Producto</button>
    </form>
</div>
